<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloom · Tasks & Habits</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg1: #fef3c7; --bg2: #fce7f3; --bg3: #ddd6fe; --bg4: #bae6fd;
    --ink: #1f1147; --ink-soft: #5b4b8a; --card: #ffffff;
    --pink: #ff6fa5; --peach: #ff9a6b; --yellow: #fcd34d;
    --mint: #6ee7b7; --sky: #7dd3fc; --lilac: #c4b5fd; --coral: #fb7185;
    --shadow: 0 6px 0 rgba(31,17,71,0.12), 0 12px 30px rgba(31,17,71,0.08);
  }
  html, body {
    min-height: 100vh; font-family: 'Inter', sans-serif; color: var(--ink);
    background:
      radial-gradient(900px 600px at 10% -10%, var(--bg2), transparent 60%),
      radial-gradient(800px 700px at 100% 0%, var(--bg3), transparent 55%),
      radial-gradient(700px 600px at 50% 110%, var(--bg4), transparent 60%),
      var(--bg1);
    overflow-x: hidden;
  }
  .blob { position: fixed; border-radius: 50%; filter: blur(40px); opacity: .55; z-index: 0; animation: float 14s ease-in-out infinite; }
  .blob.b1 { width: 280px; height: 280px; background: var(--pink); top: -60px; left: -60px; }
  .blob.b2 { width: 240px; height: 240px; background: var(--mint); bottom: -80px; right: -40px; animation-delay: -4s; }
  .blob.b3 { width: 200px; height: 200px; background: var(--sky); top: 40%; right: 8%; animation-delay: -8s; }
  @keyframes float { 0%,100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-30px) translateX(20px); } }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Auth screen */
  .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; position: relative; z-index: 1; }
  .auth-card {
    width: 100%; max-width: 420px; background: var(--card); border: 2px solid var(--ink);
    border-radius: 28px; padding: 36px; box-shadow: var(--shadow);
  }
  .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo-mark { width: 52px; height: 52px; border-radius: 18px; background: linear-gradient(135deg, var(--pink), var(--peach)); display: grid; place-items: center; font-size: 28px; box-shadow: var(--shadow); transform: rotate(-6deg); }
  .auth-card h2 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 800; }
  .auth-card .sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink-soft); }
  .field input {
    width: 100%; padding: 12px 14px; font-size: 15px; font-family: inherit;
    border: 2px solid var(--ink); border-radius: 12px; background: #fdfaf3; outline: none;
  }
  .btn-full { width: 100%; padding: 14px; font-size: 15px; }
  .toggle { text-align: center; margin-top: 16px; font-size: 14px; color: var(--ink-soft); }
  .toggle a { color: var(--pink); font-weight: 700; cursor: pointer; text-decoration: none; }
  .err { background: #fee2e2; color: #b91c1c; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; border: 1.5px solid #b91c1c; }

  /* Header */
  header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  h1 { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 800; letter-spacing: -1px; }
  .tagline { color: var(--ink-soft); font-size: 15px; margin-top: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .date-pill, .user-pill { background: var(--card); padding: 12px 18px; border-radius: 999px; box-shadow: var(--shadow); font-weight: 600; font-size: 14px; border: 2px solid var(--ink); }
  .user-pill { background: var(--lilac); cursor: pointer; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat { padding: 18px; border-radius: 20px; border: 2px solid var(--ink); box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .stat .num { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 13px; font-weight: 600; opacity: .8; margin-top: 6px; }
  .stat.s1 { background: var(--yellow); } .stat.s2 { background: var(--mint); }
  .stat.s3 { background: var(--lilac); } .stat.s4 { background: var(--coral); color: white; }

  .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px; }
  .card { background: var(--card); border-radius: 24px; padding: 24px; border: 2px solid var(--ink); box-shadow: var(--shadow); }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .card-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input { flex: 1; padding: 12px 16px; font-size: 15px; font-family: inherit; border: 2px solid var(--ink); border-radius: 14px; background: #fdfaf3; outline: none; }
  .btn { border: 2px solid var(--ink); background: var(--ink); color: white; padding: 12px 18px; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; transition: transform .1s; }
  .btn:hover { transform: translateY(-2px); } .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.pink { background: var(--pink); } .btn.mint { background: var(--mint); color: var(--ink); }

  .task-list, .habit-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
  .task { display: flex; align-items: center; gap: 12px; padding: 14px; border: 2px solid var(--ink); border-radius: 16px; background: #fff; transition: all .2s; }
  .task.done { background: #f3f4f6; opacity: .65; }
  .task.done .task-text { text-decoration: line-through; }
  .task-text { flex: 1; font-size: 15px; font-weight: 500; word-break: break-word; }
  .check { width: 26px; height: 26px; border: 2px solid var(--ink); border-radius: 8px; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; background: white; }
  .check.checked { background: var(--mint); }
  .check.checked::after { content: '✓'; font-weight: 800; font-size: 16px; }
  .del { background: transparent; border: none; color: var(--ink-soft); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 8px; }
  .del:hover { background: #fee2e2; color: #dc2626; }

  .habit { padding: 14px; border: 2px solid var(--ink); border-radius: 16px; background: #fff; display: flex; flex-direction: column; gap: 10px; }
  .habit-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .habit-name { font-weight: 600; font-size: 15px; flex: 1; }
  .streak { background: linear-gradient(135deg, var(--peach), var(--coral)); color: white; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1.5px solid var(--ink); }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day { aspect-ratio: 1; border: 2px solid var(--ink); border-radius: 10px; background: #fef9e7; display: grid; place-items: center; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--ink-soft); }
  .day:hover { transform: translateY(-2px); }
  .day.filled { background: var(--mint); color: var(--ink); }
  .day.today { box-shadow: 0 0 0 3px var(--yellow); }

  .empty { text-align: center; padding: 30px 20px; color: var(--ink-soft); font-size: 14px; }
  .empty .emoji { font-size: 40px; display: block; margin-bottom: 8px; }

  .hidden { display: none !important; }
  .loading { text-align: center; padding: 40px; color: var(--ink-soft); }

  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- AUTH SCREEN -->
<div class="auth-wrap" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">🌸</div>
      <div>
        <h2>Bloom</h2>
        <div class="sub" id="authSub">Welcome back, log in to continue</div>
      </div>
    </div>
    <div id="authErr" class="err hidden"></div>
    <div class="field" id="nameField" style="display:none;">
      <label>Name</label>
      <input id="authName" placeholder="What should we call you?"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input id="authEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="authPassword" type="password" placeholder="6+ characters" autocomplete="current-password"/>
    </div>
    <button class="btn pink btn-full" id="authBtn" onclick="submitAuth()">Log in</button>
    <div class="toggle" id="authToggle">
      New here? <a onclick="toggleMode()">Create an account</a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div class="wrap hidden" id="appScreen">
  <header>
    <div class="logo">
      <div class="logo-mark">🌸</div>
      <div>
        <h1>Bloom</h1>
        <div class="tagline">small wins, every single day</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-pill" id="datePill"></div>
      <div class="user-pill" onclick="logout()" title="Click to log out">👋 <span id="userName">...</span></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat s1"><div class="num" id="statTasks">0</div><div class="lbl">tasks today</div></div>
    <div class="stat s2"><div class="num" id="statDone">0</div><div class="lbl">completed</div></div>
    <div class="stat s3"><div class="num" id="statHabits">0</div><div class="lbl">habits tracked</div></div>
    <div class="stat s4"><div class="num" id="statStreak">0</div><div class="lbl">best streak 🔥</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-head"><div class="card-title">✨ Today's tasks</div></div>
      <div class="input-row">
        <input id="taskInput" placeholder="What needs doing? ✍️" maxlength="200"/>
        <button class="btn pink" onclick="addTask()">Add</button>
      </div>
      <div class="task-list" id="taskList"><div class="loading">Loading...</div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">🌱 Habits</div></div>
      <div class="input-row">
        <input id="habitInput" placeholder="New habit (e.g. read 10 pages)" maxlength="100"/>
        <button class="btn mint" onclick="addHabit()">Add</button>
      </div>
      <div class="habit-list" id="habitList"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ====== CONFIG ======
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:5000/api'
  : 'https://bloom-api-geif.onrender.com/api'; // <-- update after deploying

// ====== STATE ======
let token = localStorage.getItem('bloom_token');
let user = JSON.parse(localStorage.getItem('bloom_user') || 'null');
let tasks = [];
let habits = [];
let authMode = 'login'; // or 'signup'
const todayStr = new Date().toISOString().slice(0,10);

document.getElementById('datePill').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

// ====== API HELPER ======
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers||{}) };
  if (token) headers.Authorization = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ====== AUTH ======
function toggleMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('authSub').textContent =
    authMode === 'login' ? 'Welcome back, log in to continue' : 'Create your account to get started';
  document.getElementById('authBtn').textContent = authMode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('authToggle').innerHTML = authMode === 'login'
    ? 'New here? <a onclick="toggleMode()">Create an account</a>'
    : 'Already have one? <a onclick="toggleMode()">Log in</a>';
  document.getElementById('nameField').style.display = authMode === 'signup' ? 'block' : 'none';
  document.getElementById('authErr').classList.add('hidden');
}

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const name = document.getElementById('authName').value.trim();
  const errEl = document.getElementById('authErr');
  const btn = document.getElementById('authBtn');

  if (!email || !password) {
    errEl.textContent = 'Email and password required';
    errEl.classList.remove('hidden'); return;
  }

  btn.disabled = true; btn.textContent = '...';
  try {
    const path = authMode === 'login' ? '/auth/login' : '/auth/signup';
    const body = authMode === 'login' ? { email, password } : { email, password, name };
    const data = await api(path, { method: 'POST', body: JSON.stringify(body) });
    token = data.token; user = data.user;
    localStorage.setItem('bloom_token', token);
    localStorage.setItem('bloom_user', JSON.stringify(user));
    showApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Log in' : 'Sign up';
  }
}

function logout() {
  localStorage.removeItem('bloom_token');
  localStorage.removeItem('bloom_user');
  token = null; user = null; tasks = []; habits = [];
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('appScreen').classList.add('hidden');
}

async function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userName').textContent = user.name || user.email.split('@')[0];
  await loadAll();
}

// ====== TASKS ======
async function loadAll() {
  try {
    const [t, h] = await Promise.all([api('/tasks'), api('/habits')]);
    tasks = t; habits = h;
    renderTasks(); renderHabits(); updateStats();
  } catch (err) {
    console.error(err);
  }
}

document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });

async function addTask() {
  const inp = document.getElementById('taskInput');
  const v = inp.value.trim();
  if (!v) return;
  inp.value = '';
  try {
    const task = await api('/tasks', { method: 'POST', body: JSON.stringify({ text: v }) });
    tasks.unshift(task);
    renderTasks(); updateStats();
  } catch (err) { alert(err.message); }
}

async function toggleTask(id) {
  const t = tasks.find(x => x._id === id);
  if (!t) return;
  const newDone = !t.done;
  t.done = newDone; renderTasks(); updateStats();
  try { await api(`/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ done: newDone }) }); }
  catch (err) { t.done = !newDone; renderTasks(); updateStats(); alert(err.message); }
}

async function deleteTask(id) {
  const prev = tasks; tasks = tasks.filter(x => x._id !== id);
  renderTasks(); updateStats();
  try { await api(`/tasks/${id}`, { method: 'DELETE' }); }
  catch (err) { tasks = prev; renderTasks(); updateStats(); alert(err.message); }
}

function renderTasks() {
  const list = document.getElementById('taskList');
  if (!tasks.length) {
    list.innerHTML = '<div class="empty"><span class="emoji">🍃</span>No tasks yet. Add one above!</div>';
    return;
  }
  list.innerHTML = tasks.map(t => `
    <div class="task ${t.done ? 'done':''}">
      <div class="check ${t.done ? 'checked':''}" onclick="toggleTask('${t._id}')"></div>
      <div class="task-text">${escapeHtml(t.text)}</div>
      <button class="del" onclick="deleteTask('${t._id}')" title="Delete">✕</button>
    </div>
  `).join('');
}

// ====== HABITS ======
async function addHabit() {
  const inp = document.getElementById('habitInput');
  const v = inp.value.trim();
  if (!v) return;
  inp.value = '';
  try {
    const h = await api('/habits', { method: 'POST', body: JSON.stringify({ name: v }) });
    habits.unshift(h);
    renderHabits(); updateStats();
  } catch (err) { alert(err.message); }
}

async function toggleHabitDay(id, dateStr) {
  try {
    const updated = await api(`/habits/${id}/toggle`, { method: 'PATCH', body: JSON.stringify({ date: dateStr }) });
    const idx = habits.findIndex(h => h._id === id);
    if (idx >= 0) habits[idx] = updated;
    renderHabits(); updateStats();
  } catch (err) { alert(err.message); }
}

async function deleteHabit(id) {
  const prev = habits; habits = habits.filter(x => x._id !== id);
  renderHabits(); updateStats();
  try { await api(`/habits/${id}`, { method: 'DELETE' }); }
  catch (err) { habits = prev; renderHabits(); updateStats(); alert(err.message); }
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push({ date: d.toISOString().slice(0,10), label: d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0,1) });
  }
  return days;
}

function calcStreak(habit) {
  // habit.log comes from Mongoose as a plain object after JSON
  const log = habit.log || {};
  let streak = 0;
  const d = new Date();
  while (true) {
    const ds = d.toISOString().slice(0,10);
    if (log[ds]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function renderHabits() {
  const list = document.getElementById('habitList');
  if (!habits.length) {
    list.innerHTML = '<div class="empty"><span class="emoji">🌱</span>No habits yet. Plant one!</div>';
    return;
  }
  const days = getLast7Days();
  list.innerHTML = habits.map(h => {
    const log = h.log || {};
    const streak = calcStreak(h);
    return `
      <div class="habit">
        <div class="habit-top">
          <div class="habit-name">${escapeHtml(h.name)}</div>
          <span class="streak">🔥 ${streak}</span>
          <button class="del" onclick="deleteHabit('${h._id}')" title="Delete">✕</button>
        </div>
        <div class="week">
          ${days.map(d => `
            <div class="day ${log[d.date] ? 'filled':''} ${d.date === todayStr ? 'today':''}"
                 onclick="toggleHabitDay('${h._id}', '${d.date}')" title="${d.date}">${d.label}</div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function updateStats() {
  document.getElementById('statTasks').textContent = tasks.length;
  document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;
  document.getElementById('statHabits').textContent = habits.length;
  const best = habits.reduce((m, h) => Math.max(m, calcStreak(h)), 0);
  document.getElementById('statStreak').textContent = best;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ====== INIT ======
if (token && user) showApp();
</script>
</body>
</html>
